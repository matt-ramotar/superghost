name: Update Homebrew Cask

on:
  # Trigger after the release workflow completes (not on release:published,
  # which fires before assets finish uploading — causing SHA mismatch).
  workflow_run:
    workflows: ["Release macOS app"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.58.0 or v0.58.0)'
        required: true

permissions:
  contents: read

jobs:
  update-cask:
    runs-on: ubuntu-latest
    # Only run if the release workflow succeeded (or manual trigger)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repo for release identity
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: repo

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # workflow_run: extract tag from the triggering workflow's head branch
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Invalid version: ${VERSION}" >&2
              exit 1
            fi
            echo "Skipping homebrew cask update for non-release ref: ${VERSION}"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating homebrew cask to version $VERSION"

      - name: Load release identity
        if: steps.version.outputs.skip != 'true'
        run: |
          source repo/scripts/release_identity.sh
          {
            echo "RELEASE_PRODUCT_NAME=${RELEASE_PRODUCT_NAME}"
            echo "RELEASE_APP_BUNDLE_NAME=${RELEASE_APP_BUNDLE_NAME}"
            echo "RELEASE_BUNDLE_IDENTIFIER=${RELEASE_BUNDLE_IDENTIFIER}"
            echo "RELEASE_BUNDLED_CLI_NAME=${RELEASE_BUNDLED_CLI_NAME}"
            echo "RELEASE_APP_SUPPORT_DIR_NAME=${RELEASE_APP_SUPPORT_DIR_NAME}"
            echo "RELEASE_CACHE_DIR_NAME=${RELEASE_CACHE_DIR_NAME}"
            echo "RELEASE_DMG_ASSET_NAME=${RELEASE_DMG_ASSET_NAME}"
            echo "RELEASE_CASK_NAME=${RELEASE_CASK_NAME}"
            echo "RELEASE_LEGACY_CASK_NAME=${RELEASE_LEGACY_CASK_NAME}"
            echo "RELEASE_WEBSITE_URL=${RELEASE_WEBSITE_URL}"
            echo "RELEASE_GITHUB_REPOSITORY=${RELEASE_GITHUB_REPOSITORY}"
            echo "RELEASE_HOMEBREW_TAP_REPOSITORY=${RELEASE_HOMEBREW_TAP_REPOSITORY}"
          } >> "$GITHUB_ENV"

      - name: Download DMG and get SHA256
        id: sha
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/${RELEASE_GITHUB_REPOSITORY}/releases/download/v${VERSION}/${RELEASE_DMG_ASSET_NAME}"
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -sL -w '%{http_code}' "$URL" -o "${RELEASE_CASK_NAME}.dmg")
            FILE_SIZE=$(stat --printf="%s" "${RELEASE_CASK_NAME}.dmg" 2>/dev/null || stat -f%z "${RELEASE_CASK_NAME}.dmg")
            if [ "$HTTP_CODE" = "200" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
              echo "Download OK: HTTP $HTTP_CODE, size $FILE_SIZE bytes"
              break
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE, size ${FILE_SIZE:-0} bytes"
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download DMG after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            sleep 30
          done
          SHA256=$(shasum -a 256 "${RELEASE_CASK_NAME}.dmg" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "DMG SHA256: $SHA256"

      - name: Skip tap update when token is unavailable
        if: steps.version.outputs.skip != 'true' && secrets.HOMEBREW_TAP_TOKEN == ''
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update." >> "$GITHUB_STEP_SUMMARY"
          echo "Set HOMEBREW_TAP_TOKEN to enable automatic updates to ${RELEASE_HOMEBREW_TAP_REPOSITORY}."

      - name: Checkout homebrew-cmux
        if: steps.version.outputs.skip != 'true' && secrets.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: matt-ramotar/homebrew-cmux
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-cmux

      - name: Update cask formula
        if: steps.version.outputs.skip != 'true' && secrets.HOMEBREW_TAP_TOKEN != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > "homebrew-cmux/Casks/${RELEASE_CASK_NAME}.rb" << CASKEOF
          cask "${RELEASE_CASK_NAME}" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${RELEASE_GITHUB_REPOSITORY}/releases/download/v#{version}/${RELEASE_DMG_ASSET_NAME}"
            name "${RELEASE_PRODUCT_NAME}"
            desc "Lightweight native macOS terminal with vertical tabs for AI coding agents"
            homepage "${RELEASE_WEBSITE_URL}"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "${RELEASE_APP_BUNDLE_NAME}"
            binary "#{appdir}/${RELEASE_APP_BUNDLE_NAME}/Contents/Resources/bin/${RELEASE_BUNDLED_CLI_NAME}"

            zap trash: [
              "~/Library/Application Support/${RELEASE_APP_SUPPORT_DIR_NAME}",
              "~/Library/Caches/${RELEASE_CACHE_DIR_NAME}",
              "~/Library/Preferences/${RELEASE_BUNDLE_IDENTIFIER}.plist",
            ]
          end
          CASKEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "homebrew-cmux/Casks/${RELEASE_CASK_NAME}.rb"
          if [ "${RELEASE_LEGACY_CASK_NAME}" != "${RELEASE_CASK_NAME}" ]; then
            rm -f "homebrew-cmux/Casks/${RELEASE_LEGACY_CASK_NAME}.rb"
          fi

      - name: Verify cask SHA matches DMG
        if: steps.version.outputs.skip != 'true' && secrets.HOMEBREW_TAP_TOKEN != ''
        run: |
          CASK_SHA=$(grep 'sha256' "homebrew-cmux/Casks/${RELEASE_CASK_NAME}.rb" | sed 's/.*"\(.*\)".*/\1/')
          ACTUAL_SHA=$(shasum -a 256 "${RELEASE_CASK_NAME}.dmg" | cut -d' ' -f1)
          if [ "$CASK_SHA" != "$ACTUAL_SHA" ]; then
            echo "SHA mismatch! Cask: $CASK_SHA, Actual: $ACTUAL_SHA" >&2
            exit 1
          fi
          echo "SHA verification passed: $CASK_SHA"

      - name: Commit and push
        if: steps.version.outputs.skip != 'true' && secrets.HOMEBREW_TAP_TOKEN != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-cmux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "Casks/${RELEASE_CASK_NAME}.rb" "Casks/${RELEASE_LEGACY_CASK_NAME}.rb"
          if git diff --staged --quiet; then
            echo "No changes - cask already up to date"
          else
            git commit -m "Update ${RELEASE_CASK_NAME} to ${VERSION}"
            git push
          fi
